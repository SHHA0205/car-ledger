<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f0f4f8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>차계부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-top">
        <div>
          <h1 class="header-title" id="page-title">차계부</h1>
          <p class="header-sub" id="page-sub">이번 달 지출을 한눈에</p>
        </div>
        <div class="sync-indicator" id="sync-indicator" title="클라우드 동기화 상태">
          <span class="sync-badge offline" id="sync-badge"></span>
          <span class="sync-status-text" id="sync-status-text">오프라인</span>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- 홈 -->
      <section class="page active" id="page-home" data-title="차계부" data-sub="이번 달 지출을 한눈에">
        <div class="summary-grid">
          <div class="summary-card fuel">
            <span class="summary-label">주유</span>
            <span class="summary-value" id="sum-fuel">0원</span>
          </div>
          <div class="summary-card maint">
            <span class="summary-label">정비</span>
            <span class="summary-value" id="sum-maint">0원</span>
          </div>
          <div class="summary-card dist">
            <span class="summary-label">운행거리</span>
            <span class="summary-value" id="sum-dist">0 km</span>
          </div>
          <div class="summary-card total">
            <span class="summary-label">총 지출</span>
            <span class="summary-value" id="sum-total">0원</span>
          </div>
        </div>
        <div class="card chart-card">
          <h2 class="card-title">최근 1년 월별 지출</h2>
          <p class="chart-sub" id="chart-year-total"></p>
          <div class="chart-wrap">
            <canvas id="monthly-chart" aria-label="최근 1년 월별 지출 그래프"></canvas>
          </div>
        </div>
        <div class="card">
          <h2 class="card-title">최근 기록</h2>
          <div id="recent-list" class="entry-list"></div>
        </div>
      </section>

      <!-- 주유 -->
      <section class="page" id="page-fuel" data-title="주유 기록" data-sub="주유소 검색 후 리터만 입력하세요">
        <div class="card">
          <label class="field-label">날짜</label>
          <input type="date" id="fuel-date" class="field-input">

          <p class="hint" id="fuel-api-hint"></p>
          <label class="field-label">주유소 검색</label>
          <div class="search-row">
            <input type="search" id="station-search" class="field-input" placeholder="주유소 이름으로 필터" autocomplete="off">
            <button type="button" class="btn-icon" id="btn-nearby" title="내 주변">📍</button>
          </div>
          <label class="field-label">또는 지역으로 검색</label>
          <div class="search-row">
            <select id="region-select" class="field-input">
              <option value="">지역 선택</option>
              <option value="01">서울</option>
              <option value="02">경기</option>
              <option value="15">인천</option>
              <option value="03">강원</option>
              <option value="04">충북</option>
              <option value="05">충남</option>
              <option value="19">세종</option>
              <option value="17">대전</option>
              <option value="06">전북</option>
              <option value="20">전남/광주</option>
              <option value="08">경북</option>
              <option value="14">대구</option>
              <option value="09">경남</option>
              <option value="10">부산</option>
              <option value="18">울산</option>
              <option value="11">제주</option>
            </select>
            <button type="button" class="btn-icon" id="btn-region" title="지역 검색">🔍</button>
          </div>
          <div id="station-results" class="station-results hidden"></div>

          <div id="selected-station" class="selected-station hidden">
            <div class="station-name" id="sel-station-name"></div>
            <div class="station-addr" id="sel-station-addr"></div>
            <div class="price-row">
              <div class="price-badge gasoline">
                <span>휘발유</span>
                <strong id="price-gasoline">-</strong>
              </div>
              <div class="price-badge diesel">
                <span>경유</span>
                <strong id="price-diesel">-</strong>
              </div>
            </div>
          </div>

          <label class="field-label">유종</label>
          <div class="chip-group" id="fuel-type-chips">
            <button type="button" class="chip active" data-type="B027">휘발유</button>
            <button type="button" class="chip" data-type="D047">경유</button>
          </div>

          <label class="field-label">주유량 (L)</label>
          <input type="number" id="fuel-liters" class="field-input" placeholder="예: 40" min="0" step="0.01" inputmode="decimal">

          <div class="calc-preview" id="fuel-calc">
            <span>예상 금액</span>
            <strong id="fuel-amount">0원</strong>
          </div>

          <label class="field-label">운행거리 (km, 선택)</label>
          <input type="number" id="fuel-distance" class="field-input" placeholder="해당 날짜 운행거리" min="0" step="1" inputmode="numeric">

          <button type="button" class="btn-primary" id="btn-save-fuel">주유 기록 저장</button>
        </div>
      </section>

      <!-- 정비 -->
      <section class="page" id="page-maint" data-title="정비 기록" data-sub="윤활유, 타이어 등 수동 입력">
        <div class="card">
          <label class="field-label">날짜</label>
          <input type="date" id="maint-date" class="field-input">

          <label class="field-label">항목</label>
          <div class="chip-group" id="maint-category-chips">
            <button type="button" class="chip active" data-cat="oil">윤활유 교환</button>
            <button type="button" class="chip" data-cat="tire">타이어 정비</button>
            <button type="button" class="chip" data-cat="brake">브레이크</button>
            <button type="button" class="chip" data-cat="filter">필터 교환</button>
            <button type="button" class="chip" data-cat="wash">세차/코팅</button>
            <button type="button" class="chip" data-cat="etc">기타</button>
          </div>

          <label class="field-label">내용 (선택)</label>
          <input type="text" id="maint-desc" class="field-input" placeholder="예: 5W-30 합성유 교환">

          <label class="field-label">금액 (원)</label>
          <input type="number" id="maint-amount" class="field-input" placeholder="예: 80000" min="0" step="100" inputmode="numeric">

          <label class="field-label">운행거리 (km, 선택)</label>
          <input type="number" id="maint-distance" class="field-input" placeholder="해당 날짜 운행거리" min="0" step="1" inputmode="numeric">

          <button type="button" class="btn-primary" id="btn-save-maint">정비 기록 저장</button>
        </div>
      </section>

      <!-- 기록 -->
      <section class="page" id="page-history" data-title="전체 기록" data-sub="날짜별 지출 내역">
        <div class="filter-row">
          <input type="month" id="history-month" class="field-input">
          <select id="history-filter" class="field-input">
            <option value="all">전체</option>
            <option value="fuel">주유</option>
            <option value="maintenance">정비</option>
          </select>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <!-- 설정 -->
      <section class="page" id="page-settings" data-title="설정" data-sub="클라우드 동기화 및 데이터 관리">
        <div class="card">
          <h2 class="card-title">클라우드 동기화</h2>
          <p class="hint">로그인하면 여러 기기에서 차계부 데이터를 자동으로 맞출 수 있습니다.</p>
          <div id="auth-logged-out">
            <label class="field-label">이메일</label>
            <input type="email" id="auth-email" class="field-input" placeholder="example@email.com" autocomplete="username">
            <label class="field-label">비밀번호</label>
            <input type="password" id="auth-password" class="field-input" placeholder="6자 이상" autocomplete="current-password">
            <button type="button" class="btn-primary" id="btn-login">로그인</button>
            <button type="button" class="btn-secondary" id="btn-register">회원가입</button>
          </div>
          <div id="auth-logged-in" class="hidden">
            <div class="auth-user">
              <span class="auth-user-label">연동 계정</span>
              <strong id="auth-user-email"></strong>
            </div>
            <button type="button" class="btn-secondary" id="btn-sync-now">지금 동기화</button>
            <button type="button" class="btn-danger" id="btn-logout">로그아웃</button>
          </div>
        </div>
        <div class="card">
          <h2 class="card-title">오피넷 API 키</h2>
          <p class="hint">실시간 유가 조회를 위해 <a href="https://www.opinet.co.kr/user/custapi/openApiNew.do" target="_blank" rel="noopener">오피넷</a>에서 무료 인증키를 발급받으세요.</p>
          <input type="password" id="api-key" class="field-input" placeholder="인증키 입력" autocomplete="off">
          <button type="button" class="btn-secondary" id="btn-save-key">API 키 저장</button>
        </div>
        <div class="card">
          <h2 class="card-title">데이터</h2>
          <button type="button" class="btn-secondary" id="btn-export">데이터보내기 (JSON)</button>
          <button type="button" class="btn-danger" id="btn-clear">전체 기록 삭제</button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button type="button" class="nav-item active" data-page="home">
        <span class="nav-icon">🏠</span>
        <span>홈</span>
      </button>
      <button type="button" class="nav-item" data-page="fuel">
        <span class="nav-icon">⛽</span>
        <span>주유</span>
      </button>
      <button type="button" class="nav-item" data-page="maint">
        <span class="nav-icon">🔧</span>
        <span>정비</span>
      </button>
      <button type="button" class="nav-item" data-page="history">
        <span class="nav-icon">📋</span>
        <span>기록</span>
      </button>
      <button type="button" class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span>설정</span>
      </button>
    </nav>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="/js/coord.js"></script>
  <script src="/js/sync.js" defer></script>
  <script src="/js/app.js" defer></script>
</body>
</html>
