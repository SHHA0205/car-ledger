# Render Blueprint: GitHub 연결 후 "New > Blueprint"로 배포
services:
  - type: web
    name: car-ledger
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: car-ledger-data
      mountPath: /var/data
      sizeGB: 1