# Render Blueprint — Free 플랜 (결제 없이 배포 가능)
services:
  - type: web
    name: car-ledger
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: OPINET_API_KEY
        sync: false